<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Review AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="container mt-5">
    <h2 class="mb-4">Movie Review Analyzer</h2>

    <form action="" method="post">
        {% csrf_token %}

        <div class="mb-3">
            <input type ="text" name="movie_name" class="form-control" placeholder="Enter Movie Nmae">
        </div>

        <div class="mb-3">
            <textarea name="movie_review" class="form-control" placeholder="Write Movie Review"></textarea>
        </div>

        <div class="mb-3">
            <input type="number" name="movie_rating" class="form-control" placeholder="Enter Movie Rating">
        </div>

        <button type="submit" class="btn btn-primary"> Submit</button>
    </form>

    {% if opinion %}
        <strong> Opinion : {{opinion}} </strong>
    {% endif %}

</body>
</html>
